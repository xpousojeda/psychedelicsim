<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#060608">
<title>Perception Engine</title>
<style>
  /* ── Reset & base ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --c: #b98aff;          /* accent – changes with substance */
    --bg: #060608;
    --panel: #0c0c14;
    --row: #101019;
    --border: #1e1e2e;
    --muted: #55556f;
    --text: #e8e8f0;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bot: env(safe-area-inset-bottom, 0px);
    --safe-l:   env(safe-area-inset-left,  0px);
    --safe-r:   env(safe-area-inset-right, 0px);
  }
  html, body {
    height: 100%; overflow: hidden;
    background: var(--bg); color: var(--text);
    font-family: 'DM Mono', ui-monospace, 'Cascadia Code', monospace;
    -webkit-tap-highlight-color: transparent;
    user-select: none; -webkit-user-select: none;
    overscroll-behavior: none;
  }

  /* ── Layout shell ── */
  #app {
    display: flex;
    width: 100%; height: 100dvh;
    flex-direction: column;   /* mobile default: column */
    position: relative;
  }

  /* Desktop: side-by-side */
  @media (min-width: 768px) {
    #app { flex-direction: row; }
    #topbar { display: none !important; }
    #sidebar {
      display: flex !important;
      flex-direction: column;
      width: 320px; min-width: 280px; max-width: 380px;
      height: 100dvh;
      background: var(--panel);
      border-right: 1px solid color-mix(in srgb, var(--c) 25%, transparent);
      flex-shrink: 0;
      overflow: hidden;
      padding-top: var(--safe-top);
      padding-left: var(--safe-l);
    }
    #stage { flex: 1; height: 100dvh; }
    #sheet { display: none !important; }
    #fab-play, #fab-save, #fab-settings { bottom: calc(var(--safe-bot) + 20px); }
  }

  /* ── Top bar (mobile only) ── */
  #topbar {
    display: flex; align-items: center; gap: 12px;
    padding: calc(var(--safe-top) + 10px) 16px 10px;
    padding-left: calc(var(--safe-l) + 16px);
    padding-right: calc(var(--safe-r) + 16px);
    background: rgba(8,8,12,0.94);
    border-bottom: 1px solid color-mix(in srgb, var(--c) 18%, transparent);
    flex-shrink: 0; z-index: 10;
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    transition: border-color .4s;
  }
  #orb {
    width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0;
    background: conic-gradient(from 0deg, var(--c), #ff8a3d, #46d6ff, #b98aff, var(--c));
    transition: box-shadow .6s;
  }
  #orb.spinning { animation: spin 4s linear infinite; }
  #topbar-title { font-size: 14px; font-weight: 700; letter-spacing: .16em; color: #f0f0fa; }
  #topbar-sub {
    font-size: 11px; color: var(--muted); letter-spacing: .06em;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px;
  }
  #dose-pips { display: flex; gap: 4px; align-items: center; flex-shrink: 0; }
  .pip {
    width: 7px; height: 7px; border-radius: 50%;
    background: #23233a; transition: background .3s, box-shadow .3s;
  }
  .pip.active { background: var(--c); box-shadow: 0 0 6px var(--c); }

  /* ── Canvas stage ── */
  #stage {
    flex: 1; position: relative; overflow: hidden;
    background: #000; display: flex; align-items: center; justify-content: center;
  }
  #glcanvas {
    width: 100%; height: 100%;
    display: none;    /* shown once image loaded */
  }
  #empty-state {
    text-align: center; color: #252540; cursor: pointer;
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 16px;
  }
  #empty-icon { font-size: 64px; line-height: 1; }
  #empty-label { font-size: 12px; letter-spacing: .28em; color: #35354f; }
  #error-state {
    display: none; padding: 32px 24px; text-align: center; max-width: 340px;
  }
  #ai-note {
    display: none; position: absolute; top: 12px; left: 12px; right: 12px;
    font-size: 11px; line-height: 1.55; color: #aab;
    background: rgba(6,6,10,.85);
    border: 1px solid color-mix(in srgb, var(--c) 28%, transparent);
    border-radius: 10px; padding: 9px 13px;
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  }

  /* ── FABs ── */
  .fab {
    position: absolute; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; z-index: 5; touch-action: manipulation;
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    border: none; font-family: inherit; font-weight: 700;
    transition: all .3s;
  }
  #fab-play {
    bottom: calc(var(--safe-bot) + 20px); right: 18px;
    width: 56px; height: 56px; font-size: 19px;
    background: var(--c); color: #060608;
    box-shadow: 0 4px 20px color-mix(in srgb, var(--c) 45%, transparent);
  }
  #fab-play.paused {
    background: rgba(11,11,20,.92); color: var(--c);
    box-shadow: none; border: 2px solid var(--c);
  }
  #fab-save {
    bottom: calc(var(--safe-bot) + 20px); right: 84px;
    width: 48px; height: 48px; font-size: 20px;
    background: rgba(11,11,20,.88); color: var(--c);
    border: 1px solid color-mix(in srgb, var(--c) 50%, transparent);
    display: none;
  }
  #fab-settings {
    bottom: calc(var(--safe-bot) + 20px); left: 18px;
    width: 48px; height: 48px; font-size: 20px;
    background: rgba(11,11,20,.88); color: var(--muted);
    border: 1.5px solid var(--border);
  }
  #fab-settings.open { color: var(--c); border-color: var(--c); }

  /* Desktop: hide mobile FABs, show desktop equivalents in sidebar */
  @media (min-width: 768px) {
    #fab-play, #fab-save, #fab-settings { display: none !important; }
  }

  /* ── Bottom sheet (mobile) ── */
  #sheet {
    position: absolute; left: 0; right: 0; bottom: 0;
    background: var(--panel);
    border-top: 1px solid color-mix(in srgb, var(--c) 28%, transparent);
    border-radius: 20px 20px 0 0;
    max-height: 68vh;
    transform: translateY(100%);
    transition: transform .36s cubic-bezier(.32,.72,0,1), border-color .4s;
    z-index: 20; display: flex; flex-direction: column;
    box-shadow: 0 -8px 40px rgba(0,0,0,.6);
  }
  #sheet.open { transform: translateY(0); }
  #sheet-handle {
    padding: 14px 0 10px; display: flex; justify-content: center;
    cursor: pointer; flex-shrink: 0; touch-action: manipulation;
  }
  #sheet-handle-bar { width: 40px; height: 4px; border-radius: 2px; background: #28283e; }

  /* ── Sidebar (desktop) ── */
  #sidebar { display: none; } /* shown via media query */
  #sidebar-header {
    display: flex; align-items: center; gap: 12px;
    padding: 20px 20px 14px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  #sidebar-orb {
    width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
    background: conic-gradient(from 0deg, var(--c), #ff8a3d, #46d6ff, #b98aff, var(--c));
    transition: box-shadow .6s;
  }
  #sidebar-orb.spinning { animation: spin 4s linear infinite; }
  #sidebar-title { font-size: 13px; font-weight: 700; letter-spacing: .16em; color: #f0f0fa; }
  #sidebar-sub { font-size: 10px; color: var(--muted); letter-spacing: .06em; margin-top: 2px; }
  #sidebar-pips { display: flex; gap: 4px; margin-left: auto; }
  /* Desktop play/save buttons */
  #desktop-btns {
    display: flex; gap: 10px; padding: 14px 16px;
    border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  .desk-btn {
    flex: 1; padding: 11px; border-radius: 10px; cursor: pointer;
    font-family: inherit; font-size: 11px; font-weight: 700;
    letter-spacing: .1em; touch-action: manipulation;
    transition: all .25s; border: none;
  }
  #desk-play { background: var(--c); color: #060608; }
  #desk-play.paused { background: rgba(11,11,20,.9); color: var(--c); border: 1.5px solid var(--c); }
  #desk-save {
    background: #101019; color: var(--muted);
    border: 1px solid var(--border);
  }
  #desk-save:hover { color: var(--c); border-color: var(--c); }

  /* ── Shared tab bar ── */
  .tab-bar {
    display: flex; flex-shrink: 0;
    border-bottom: 1px solid var(--border);
    padding: 0 14px;
  }
  .tab-btn {
    flex: 1; padding: 12px 4px; background: none; cursor: pointer;
    font-family: inherit; font-size: 11px; letter-spacing: .18em;
    text-transform: uppercase; touch-action: manipulation;
    border: none; border-bottom: 2.5px solid transparent;
    color: var(--muted); transition: color .2s, border-color .2s;
  }
  .tab-btn.active { color: var(--c); border-bottom-color: var(--c); }

  /* ── Shared panel body ── */
  .panel-body {
    overflow-y: auto; flex: 1;
    padding: 16px 16px 0;
    padding-bottom: max(20px, var(--safe-bot));
    -webkit-overflow-scrolling: touch;
  }
  .panel-body::-webkit-scrollbar { display: none; }

  /* ── Cards / rows ── */
  .card-btn {
    display: flex; align-items: center; gap: 13px;
    width: 100%; padding: 15px; border-radius: 13px;
    cursor: pointer; text-align: left; margin-bottom: 10px;
    font-family: inherit; touch-action: manipulation;
    background: var(--row); border: 1px solid var(--border);
    color: var(--muted); transition: all .2s;
  }
  .card-btn.active {
    background: color-mix(in srgb, var(--c) 14%, transparent);
    border-color: var(--c); color: var(--c);
  }
  .card-emoji { font-size: 24px; line-height: 1; }
  .card-label { font-weight: 700; font-size: 15px; }
  .card-sub { font-size: 12px; color: var(--muted); margin-top: 3px; }
  .card-check { margin-left: auto; font-size: 16px; }

  /* Dose card */
  .dose-btn {
    position: relative; overflow: hidden;
    display: flex; align-items: center; width: 100%;
    padding: 15px; border-radius: 13px; margin-bottom: 9px;
    cursor: pointer; font-family: inherit; touch-action: manipulation;
    background: var(--row); border: 1px solid var(--border);
    color: var(--muted); transition: all .2s;
  }
  .dose-btn.active { background: color-mix(in srgb, var(--c) 14%, transparent); border-color: var(--c); color: var(--c); }
  .dose-fill {
    position: absolute; inset: 0; border-radius: 13px;
    background: color-mix(in srgb, var(--c) 7%, transparent);
    pointer-events: none;
  }
  .dose-text { position: relative; flex: 1; font-size: 14px; }
  .dose-amount { font-size: 12px; color: var(--muted); margin-left: 9px; }
  .dose-check { position: relative; font-size: 15px; }

  /* Intensity bar */
  #intensity-wrap {
    padding: 12px 14px; background: var(--row); border-radius: 11px;
    border: 1px solid var(--border); margin-bottom: 14px;
  }
  #intensity-label {
    display: flex; justify-content: space-between;
    font-size: 11px; color: var(--muted); letter-spacing: .14em; margin-bottom: 8px;
  }
  #intensity-val { color: var(--c); font-weight: 700; }
  #intensity-track { height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
  #intensity-fill { height: 100%; border-radius: 3px; transition: width .4s; }

  /* ── Upload zone ── */
  .upload-zone {
    display: block; padding: 15px; border-radius: 13px; text-align: center;
    cursor: pointer; touch-action: manipulation; margin-top: 6px;
    border: 2px dashed var(--border);
    background: transparent; color: var(--muted); font-size: 13px;
    transition: all .3s;
  }
  .upload-zone.has-image {
    border-color: color-mix(in srgb, var(--c) 45%, transparent);
    background: color-mix(in srgb, var(--c) 6%, transparent);
    color: var(--c);
  }
  .upload-zone input { display: none; }

  /* ── AI tune btn ── */
  #ai-btn {
    width: 100%; padding: 15px; border-radius: 13px; cursor: pointer;
    font-family: inherit; font-size: 13px; font-weight: 700; letter-spacing: .12em;
    touch-action: manipulation; margin-bottom: 18px;
    border: 1.5px solid var(--c); color: var(--c);
    background: color-mix(in srgb, var(--c) 14%, transparent);
    transition: all .3s;
  }
  #ai-btn:disabled { opacity: .5; cursor: default; }

  /* ── Sliders ── */
  .slider-wrap { margin-bottom: 18px; }
  .slider-header {
    display: flex; justify-content: space-between; align-items: baseline;
    font-size: 11px; letter-spacing: .12em; color: #8b8ba7; margin-bottom: 8px;
  }
  .slider-val { color: var(--c); font-weight: 700; font-size: 12px; }
  input[type=range] {
    -webkit-appearance: none; appearance: none;
    width: 100%; height: 6px;
    background: var(--border); border-radius: 4px; outline: none;
    cursor: pointer; accent-color: var(--c);
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 26px; height: 26px; border-radius: 50%;
    background: var(--c); cursor: pointer;
    box-shadow: 0 0 8px color-mix(in srgb, var(--c) 70%, transparent);
  }
  input[type=range]::-moz-range-thumb {
    width: 26px; height: 26px; border-radius: 50%;
    background: var(--c); border: none; cursor: pointer;
    box-shadow: 0 0 8px color-mix(in srgb, var(--c) 70%, transparent);
  }

  /* ── Form-constant pills ── */
  #fc-pills { display: flex; gap: 7px; margin-bottom: 16px; flex-wrap: wrap; }
  .fc-pill {
    flex: 1; min-width: 52px; padding: 11px 4px; border-radius: 9px; cursor: pointer;
    font-family: inherit; font-size: 10px; letter-spacing: .04em;
    touch-action: manipulation; text-transform: uppercase;
    background: var(--row); border: 1px solid var(--border); color: var(--muted);
    transition: all .2s;
  }
  .fc-pill.active {
    background: color-mix(in srgb, var(--c) 18%, transparent);
    border-color: var(--c); color: var(--c);
  }

  /* ── Toggle row ── */
  .toggle-row { display: flex; gap: 9px; margin-bottom: 18px; }
  .toggle-btn {
    flex: 1; padding: 13px 10px; border-radius: 11px; cursor: pointer;
    font-family: inherit; font-size: 11px; letter-spacing: .1em;
    touch-action: manipulation;
    background: var(--row); border: 1px solid var(--border); color: var(--muted);
    transition: all .2s;
  }
  .toggle-btn.active {
    background: color-mix(in srgb, var(--c) 18%, transparent);
    border-color: var(--c); color: var(--c);
  }

  /* ── Section heading ── */
  .section-head {
    font-size: 11px; color: var(--muted); letter-spacing: .18em;
    margin-bottom: 12px; display: block;
  }

  /* ── Disclaimer ── */
  .disclaimer {
    margin-top: 16px; margin-bottom: 4px;
    padding: 12px 13px; background: #090910;
    border: 1px solid #16162a; border-radius: 10px;
    font-size: 11px; color: #45455f; line-height: 1.65;
  }

  /* ── Animations ── */
  @keyframes spin { from { transform: rotate(0) } to { transform: rotate(360deg) } }

  /* Prevent iOS zoom on focus */
  input, button, select, textarea { font-size: 16px; }
  input[type=range] { font-size: inherit; }
</style>
</head>
<body>

<div id="app">

  <!-- ═══ TOP BAR (mobile) ═══ -->
  <div id="topbar">
    <div id="orb"></div>
    <div style="flex:1;min-width:0">
      <div id="topbar-title">PERCEPTION ENGINE</div>
      <div id="topbar-sub">🍄 Psilocybin · Moderate (2g) · GPU real-time</div>
    </div>
    <div id="dose-pips"></div>
  </div>

  <!-- ═══ CANVAS STAGE ═══ -->
  <div id="stage">
    <canvas id="glcanvas"></canvas>

    <div id="empty-state">
      <div id="empty-icon">◎</div>
      <div id="empty-label">TAP TO UPLOAD AN IMAGE</div>
    </div>

    <div id="error-state">
      <div style="font-size:44px;margin-bottom:16px">⚠</div>
      <div id="error-msg" style="font-size:14px;color:#ff8a8a;line-height:1.65;margin-bottom:10px"></div>
      <div style="font-size:12px;color:#6b6b85;line-height:1.65">
        Real-time mode needs WebGL2 with float textures.<br>Try Chrome, Firefox, or Safari 15+ on a modern device.
      </div>
    </div>

    <div id="ai-note"></div>

    <!-- Mobile FABs -->
    <button class="fab" id="fab-play" style="display:none">▶</button>
    <button class="fab" id="fab-save" title="Save snapshot">↓</button>
    <button class="fab" id="fab-settings" class="open">⚙</button>
  </div>

  <!-- ═══ BOTTOM SHEET (mobile) ═══ -->
  <div id="sheet" class="open">
    <div id="sheet-handle"><div id="sheet-handle-bar"></div></div>
    <div class="tab-bar" id="mob-tabs"></div>
    <div class="panel-body" id="mob-body"></div>
  </div>

  <!-- ═══ SIDEBAR (desktop) ═══ -->
  <div id="sidebar">
    <div id="sidebar-header">
      <div id="sidebar-orb"></div>
      <div>
        <div id="sidebar-title">PERCEPTION ENGINE</div>
        <div id="sidebar-sub">GPU real-time oscillator simulator</div>
      </div>
      <div id="sidebar-pips"></div>
    </div>
    <div id="desktop-btns">
      <button class="desk-btn paused" id="desk-play">▶ PLAY</button>
      <button class="desk-btn" id="desk-save">↓ SAVE</button>
    </div>
    <div class="tab-bar" id="desk-tabs"></div>
    <div class="panel-body" id="desk-body"></div>
  </div>

</div>

<script>
'use strict';

// ══════════════════════════════════════════════════════════════════════
// DATA
// ══════════════════════════════════════════════════════════════════════
const SUBSTANCES = {
  lsd: {
    label:"LSD", sublabel:"Lysergic Acid", unit:"µg", emoji:"✦", color:"#46d6ff",
    doses:[
      {label:"Threshold",amount:"25µg",  i:0.12},
      {label:"Low",      amount:"75µg",  i:0.30},
      {label:"Moderate", amount:"150µg", i:0.55},
      {label:"Strong",   amount:"250µg", i:0.78},
      {label:"Extreme",  amount:"400µg+",i:1.00},
    ],
  },
  psilocybin: {
    label:"Psilocybin", sublabel:"Magic Mushrooms", unit:"g", emoji:"🍄", color:"#b98aff",
    doses:[
      {label:"Threshold",amount:"0.5g",i:0.10},
      {label:"Low",      amount:"1g",  i:0.22},
      {label:"Moderate", amount:"2g",  i:0.45},
      {label:"Strong",   amount:"3.5g",i:0.72},
      {label:"Heroic",   amount:"5g+", i:1.00},
    ],
  },
  dmt: {
    label:"DMT", sublabel:"Dimethyltryptamine", unit:"mg", emoji:"◈", color:"#ff8a3d",
    doses:[
      {label:"Threshold",   amount:"5mg",  i:0.10},
      {label:"Low",         amount:"15mg", i:0.25},
      {label:"Moderate",    amount:"25mg", i:0.42},
      {label:"Breakthrough",amount:"50mg", i:0.78},
      {label:"Extreme",     amount:"75mg+",i:1.00},
    ],
  },
  mescaline: {
    label:"Mescaline", sublabel:"Peyote / San Pedro", unit:"mg", emoji:"🌵", color:"#5fd38a",
    doses:[
      {label:"Threshold",amount:"100mg", i:0.12},
      {label:"Low",      amount:"200mg", i:0.28},
      {label:"Common",   amount:"350mg", i:0.50},
      {label:"Strong",   amount:"500mg", i:0.76},
      {label:"Heavy",    amount:"700mg+",i:1.00},
    ],
  },
  mdma: {
    label:"MDMA", sublabel:"Ecstasy / Molly", unit:"mg", emoji:"♡", color:"#ff6fae",
    doses:[
      {label:"Threshold",amount:"40mg",  i:0.16},
      {label:"Low",      amount:"75mg",  i:0.32},
      {label:"Common",   amount:"120mg", i:0.50},
      {label:"Strong",   amount:"180mg", i:0.74},
      {label:"Heavy",    amount:"250mg+",i:1.00},
    ],
  },
};

function makeParams(substance, t) {
  const e = (a, b) => a + (b - a) * t;
  const base = {
    oscStrength:0, coupling:2.2, kCenter:2.0, kSurround:5.0,
    freqMin:0.15, freqMax:1.2, varyBy:0, colorMode:0, windings:1,
    driftAmp:0, driftScale:3.0, driftSpeed:0.5, logPolar:0,
    formType:0, formStrength:0, formWindings:6, formFreq:2.0, formHue:200,
    saturation:e(1.0,1.3), contrast:e(1.0,1.1), brightness:e(1.0,1.05), hueRotate:0,
    speed:1.0, simRes:360,
  };
  switch (substance) {
    case 'lsd': return {...base,
      oscStrength:e(0.05,0.5), coupling:2.6, kCenter:2.0, kSurround:e(4.5,7.0),
      freqMin:0.2, freqMax:e(0.9,1.8), varyBy:0, colorMode:0, windings:2,
      driftAmp:e(0.001,0.006), driftScale:4.0, driftSpeed:0.6, logPolar:t>0.55?1:0,
      formType:t>0.55?2:3, formStrength:e(0.0,0.45), formWindings:8, formFreq:2.6, formHue:180,
      saturation:e(1.1,2.4), contrast:e(1.05,1.6), brightness:e(1.0,1.06), hueRotate:0, speed:1.0,
    };
    case 'psilocybin': return {...base,
      oscStrength:e(0.04,0.46), coupling:2.0, kCenter:2.4, kSurround:e(5.0,8.0),
      freqMin:0.12, freqMax:e(0.8,1.5), varyBy:0, colorMode:0, windings:1,
      driftAmp:e(0.002,0.012), driftScale:2.4, driftSpeed:0.4, logPolar:0,

    case 'dmt': return {...base,

      saturation:e(1.3,3.0), contrast:e(1.1,1.7), brightness:e(1.05,1.2), hueRotate:e(20,140), speed:1.4,
    };
    case 'mescaline': return {...base,
      oscStrength:e(0.05,0.44), coupling:2.2, kCenter:2.6, kSurround:e(5.5,8.5),
      freqMin:0.12, freqMax:e(0.7,1.3), varyBy:1, colorMode:0, windings:1,
      driftAmp:e(0.002,0.009), driftScale:2.0, driftSpeed:0.35, logPolar:0,
      formType:t>0.55?4:0, formStrength:e(0.0,0.35), formWindings:6, formFreq:2.4, formHue:110,
      saturation:e(1.2,2.6), contrast:e(1.0,1.3), brightness:e(1.0,1.1), hueRotate:0, speed:0.8,
    };
    case 'mdma': return {...base,
      oscStrength:e(0.0,0.12), coupling:1.6, kCenter:3.0, kSurround:7.0,

}

// ══════════════════════════════════════════════════════════════════════
// GLSL SHADERS
// ══════════════════════════════════════════════════════════════════════
const VERT = `#version 300 es
out vec2 v_uv;
void main(){
  float x=(gl_VertexID==1)?3.0:-1.0;
  float y=(gl_VertexID==2)?3.0:-1.0;
  v_uv=vec2((x+1.0)*0.5,(y+1.0)*0.5);
  gl_Position=vec4(x,y,0.0,1.0);
}`;

const INIT_FS = `#version 300 es
precision highp float;
in vec2 v_uv; out vec4 o;
uniform vec2 u_res;
void main(){
  vec2 g=v_uv*u_res;
  o=vec4(mod((g.x+g.y)*0.5,6.2831853),0.0,0.0,1.0);
}`;

const SIM_FS = `#version 300 es
precision highp float;
in vec2 v_uv; out vec4 o;
uniform sampler2D u_phase,u_params;
uniform vec2 u_texel;
uniform float u_dt,u_coupling,u_kCenter,u_kSurround,u_freqMin,u_freqMax;
uniform int u_varyBy;
const float TAU=6.2831853;
void main(){
  float ph=texture(u_phase,v_uv).r;
  vec2 pm=texture(u_params,v_uv).rg;
  float t=(u_varyBy==0)?pm.g:(u_varyBy==1)?pm.r
         :(sin(v_uv.x/u_texel.x*0.4)*sin(v_uv.y/u_texel.y*0.4)*0.5+0.5);
  float freq=mix(u_freqMin,u_freqMax,t);
  float c=0.0;
  const int TAPS=10;
  for(int k=0;k<TAPS;k++){
    float a=float(k)/float(TAPS)*TAU;
    vec2 dir=vec2(cos(a),sin(a));
    float nr=texture(u_phase,v_uv+dir*u_kCenter*u_texel).r;
    float fr=texture(u_phase,v_uv+dir*u_kSurround*u_texel).r;
    c+=sin(nr-ph); c-=0.7*sin(fr-ph);
  }
  c/=float(TAPS);
  o=vec4(ph+u_dt*(freq+u_coupling*c),0.0,0.0,1.0);
}`;

const DISP_FS = `#version 300 es
precision highp float;
in vec2 v_uv; out vec4 o;
uniform sampler2D u_phase,u_image;
uniform float u_time,u_aspect;
uniform float u_oscStrength,u_windings;
uniform int u_colorMode,u_logPolar;
uniform float u_driftAmp,u_driftScale,u_driftSpeed;
uniform int u_formType;
uniform float u_formStrength,u_formWindings,u_formFreq,u_formHue;
uniform float u_saturation,u_contrast,u_brightness,u_hueRotate;
const float TAU=6.2831853; const float PI=3.14159265;

vec3 hsl2rgb(float h,float s,float l){
  vec3 rgb=clamp(abs(mod(h*6.0+vec3(0.0,4.0,2.0),6.0)-3.0)-1.0,0.0,1.0);
  return l+s*(rgb-0.5)*(1.0-abs(2.0*l-1.0));
}
vec3 applyHue(vec3 c,float deg){
  float a=radians(deg),co=cos(a),si=sin(a);
  mat3 m=mat3(
    0.299+0.701*co+0.168*si,0.587-0.587*co+0.330*si,0.114-0.114*co-0.497*si,
    0.299-0.299*co-0.328*si,0.587+0.413*co+0.035*si,0.114-0.114*co+0.292*si,
    0.299-0.300*co+1.250*si,0.587-0.588*co-1.050*si,0.114+0.886*co-0.203*si);
  return clamp(m*c,0.0,1.0);
}
vec3 colorFromPhase(float ph){
  if(u_colorMode==1){float v=0.5+0.5*sin(ph*u_windings);return vec3(v);}
  if(u_colorMode==2){float v=0.5+0.5*sin(ph*u_windings);return mix(vec3(0.1,0.2,1.0),vec3(1.0,0.9,0.1),v);}
  return hsl2rgb(fract(ph*u_windings/TAU),1.0,0.55);
}
float formWave(vec2 uv){
  vec2 d=uv-0.5; d.x*=u_aspect;
  float ang=atan(d.y,d.x),rad=length(d);
  float lr=log(0.2+rad*23.0)/PI;
  float w=0.0;
  if(u_formType==1)w=sin(lr*u_formFreq*6.0);
  else if(u_formType==2)w=sin(lr*u_formFreq*6.0+ang*u_formWindings);
  else if(u_formType==3)w=sin(ang*u_formWindings*2.0);
  else if(u_formType==4)w=sin(lr*u_formFreq*6.0)*sin(ang*u_formWindings*2.0);
  return pow(abs(w),8.0);
}
void main(){
  vec2 drift=vec2(
    sin(v_uv.y*u_driftScale*6.0+u_time*u_driftSpeed),
    cos(v_uv.x*u_driftScale*6.0+u_time*u_driftSpeed*0.9)
  )*u_driftAmp;
  vec2 uv=v_uv+drift;
  vec2 uvOsc=uv;
  if(u_logPolar==1){
    vec2 d=uv-0.5; d.x*=u_aspect;
    float ang=atan(d.y,d.x),rad=length(d);
    float lr=log(0.2+rad*23.0)/PI;
    uvOsc=vec2(fract(ang/TAU+0.5),clamp(lr,0.0,1.0));
  }
  float ph=texture(u_phase,uvOsc).r;
  vec3 osc=colorFromPhase(ph);
  vec3 photo=texture(u_image,uv).rgb;
  photo=applyHue(photo,u_hueRotate);
  float lum=dot(photo,vec3(0.299,0.587,0.114));
  photo=mix(vec3(lum),photo,u_saturation);
  photo=(photo-0.5)*u_contrast+0.5;
  photo*=u_brightness;
  photo=clamp(photo,0.0,1.0);
  vec3 col=1.0-(1.0-photo)*(1.0-osc*u_oscStrength);
  if(u_formType>0&&u_formStrength>0.001){
    float line=formWave(uv);
    vec3 fc=hsl2rgb(fract(u_formHue/360.0+ph*0.1),1.0,0.6)*line*u_formStrength;
    col=1.0-(1.0-col)*(1.0-fc);
  }
  o=vec4(clamp(col,0.0,1.0),1.0);
}`;

// ══════════════════════════════════════════════════════════════════════
// ENGINE
// ══════════════════════════════════════════════════════════════════════
class Engine {
  constructor(canvas) {
    this.canvas = canvas;
    this.gl = canvas.getContext('webgl2', {preserveDrawingBuffer:true, antialias:false});
    if (!this.gl) throw new Error('WebGL2 is not available in this browser.');
    const gl = this.gl;
    if (!gl.getExtension('EXT_color_buffer_float'))
      throw new Error('EXT_color_buffer_float not supported — float textures required for the oscillator simulation.');
    this.progInit = this._prog(VERT, INIT_FS);
    this.progSim  = this._prog(VERT, SIM_FS);
    this.progDisp = this._prog(VERT, DISP_FS);
    this.vao = gl.createVertexArray();
    this.params = makeParams('psilocybin', 0.45);
    this.time = 0; this.simRes = {w:2,h:2}; this.ready = false;
  }
  _sh(type, src) {
    const gl = this.gl, s = gl.createShader(type);
    gl.shaderSource(s, src); gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS))
      throw new Error('Shader: ' + gl.getShaderInfoLog(s));
    return s;
  }
  _prog(vs, fs) {
    const gl = this.gl, p = gl.createProgram();
    gl.attachShader(p, this._sh(gl.VERTEX_SHADER, vs));
    gl.attachShader(p, this._sh(gl.FRAGMENT_SHADER, fs));
    gl.linkProgram(p);
    if (!gl.getProgramParameter(p, gl.LINK_STATUS))
      throw new Error('Program: ' + gl.getProgramInfoLog(p));
    return p;
  }
  _tex(w, h, data=null) {
    const gl = this.gl, t = gl.createTexture();
    gl.bindTexture(gl.TEXTURE_2D, t);
    gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA32F,w,h,0,gl.RGBA,gl.FLOAT,data);
    gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.NEAREST);
    gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.NEAREST);
    gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.REPEAT);
    gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.REPEAT);
    return t;
  }
  _fbo(tex) {
    const gl = this.gl, f = gl.createFramebuffer();
    gl.bindFramebuffer(gl.FRAMEBUFFER, f);
    gl.framebufferTexture2D(gl.FRAMEBUFFER,gl.COLOR_ATTACHMENT0,gl.TEXTURE_2D,tex,0);
    return f;
  }
  setImage(img) {
    const gl = this.gl, aspect = img.width/img.height;
    const cap = this.params.simRes;
    let sw, sh;
    if (aspect>=1){sw=cap;sh=Math.max(2,Math.round(cap/aspect));}
    else{sh=cap;sw=Math.max(2,Math.round(cap*aspect));}
    this.simRes={w:sw,h:sh}; this.aspect=aspect;
    const c=document.createElement('canvas'); c.width=sw; c.height=sh;
    const cx=c.getContext('2d');
    cx.translate(0,sh); cx.scale(1,-1); cx.drawImage(img,0,0,sw,sh);
    const px=cx.getImageData(0,0,sw,sh).data;
    const bright=new Float32Array(sw*sh);
    for(let i=0;i<sw*sh;i++) bright[i]=(px[i*4]+px[i*4+1]+px[i*4+2])/765;
    const param=new Float32Array(sw*sh*4);
    for(let y=0;y<sh;y++) for(let x=0;x<sw;x++){
      const i=y*sw+x; let edge=0;
      if(x>0&&x<sw-1&&y>0&&y<sh-1){
        const gx=-bright[i-sw-1]-2*bright[i-1]-bright[i+sw-1]+bright[i-sw+1]+2*bright[i+1]+bright[i+sw+1];
        const gy=-bright[i-sw-1]-2*bright[i-sw]-bright[i-sw+1]+bright[i+sw-1]+2*bright[i+sw]+bright[i+sw+1];
        edge=Math.min(1,Math.sqrt(gx*gx+gy*gy)/4);
      }
      param[i*4]=bright[i]; param[i*4+1]=edge; param[i*4+2]=0; param[i*4+3]=1;
    }
    if(this.paramTex) gl.deleteTexture(this.paramTex);
    this.paramTex=this._tex(sw,sh,param);
    if(this.imageTex) gl.deleteTexture(this.imageTex);
    this.imageTex=gl.createTexture();
    gl.bindTexture(gl.TEXTURE_2D,this.imageTex);
    gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL,true);
    gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,gl.RGBA,gl.UNSIGNED_BYTE,img);
    gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR);
    gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.LINEAR);
    gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE);
    gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);
    gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL,false);
    [this.texA,this.texB].forEach(t=>t&&gl.deleteTexture(t));
    [this.fboA,this.fboB].forEach(f=>f&&gl.deleteFramebuffer(f));
    this.texA=this._tex(sw,sh); this.fboA=this._fbo(this.texA);
    this.texB=this._tex(sw,sh); this.fboB=this._fbo(this.texB);
    this._initPhase(); this.ready=true;
  }
  _initPhase(){
    const gl=this.gl;
    gl.bindVertexArray(this.vao); gl.useProgram(this.progInit);
    gl.bindFramebuffer(gl.FRAMEBUFFER,this.fboA);
    gl.viewport(0,0,this.simRes.w,this.simRes.h);
    gl.uniform2f(gl.getUniformLocation(this.progInit,'u_res'),this.simRes.w,this.simRes.h);
    gl.drawArrays(gl.TRIANGLES,0,3); this.cur='A';
  }
  setParams(p){this.params=p;}
  step(){
    if(!this.ready) return;
    const gl=this.gl, P=this.params;
    const src=this.cur==='A'?this.texA:this.texB;
    const dstF=this.cur==='A'?this.fboB:this.fboA;
    gl.bindVertexArray(this.vao); gl.useProgram(this.progSim);
    gl.bindFramebuffer(gl.FRAMEBUFFER,dstF);
    gl.viewport(0,0,this.simRes.w,this.simRes.h);
    gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D,src);
    gl.uniform1i(gl.getUniformLocation(this.progSim,'u_phase'),0);
    gl.activeTexture(gl.TEXTURE1); gl.bindTexture(gl.TEXTURE_2D,this.paramTex);
    gl.uniform1i(gl.getUniformLocation(this.progSim,'u_params'),1);
    const u=n=>gl.getUniformLocation(this.progSim,n);
    gl.uniform2f(u('u_texel'),1/this.simRes.w,1/this.simRes.h);
    gl.uniform1f(u('u_dt'),0.12*P.speed);
    gl.uniform1f(u('u_coupling'),P.coupling);
    gl.uniform1f(u('u_kCenter'),P.kCenter);
    gl.uniform1f(u('u_kSurround'),P.kSurround);
    gl.uniform1f(u('u_freqMin'),P.freqMin);
    gl.uniform1f(u('u_freqMax'),P.freqMax);
    gl.uniform1i(u('u_varyBy'),P.varyBy);
    gl.drawArrays(gl.TRIANGLES,0,3);
    this.cur=this.cur==='A'?'B':'A';
  }
  render(){
    if(!this.ready) return;
    const gl=this.gl, P=this.params;
    const phase=this.cur==='A'?this.texA:this.texB;
    gl.bindVertexArray(this.vao); gl.useProgram(this.progDisp);
    gl.bindFramebuffer(gl.FRAMEBUFFER,null);
    gl.viewport(0,0,this.canvas.width,this.canvas.height);
    gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D,phase);
    gl.uniform1i(gl.getUniformLocation(this.progDisp,'u_phase'),0);
    gl.activeTexture(gl.TEXTURE1); gl.bindTexture(gl.TEXTURE_2D,this.imageTex);
    gl.uniform1i(gl.getUniformLocation(this.progDisp,'u_image'),1);
    const u=n=>gl.getUniformLocation(this.progDisp,n);
    gl.uniform1f(u('u_time'),this.time);
    gl.uniform1f(u('u_aspect'),this.aspect||1);
    gl.uniform1f(u('u_oscStrength'),P.oscStrength);
    gl.uniform1f(u('u_windings'),P.windings);
    gl.uniform1i(u('u_colorMode'),P.colorMode);
    gl.uniform1i(u('u_logPolar'),P.logPolar);
    gl.uniform1f(u('u_driftAmp'),P.driftAmp);
    gl.uniform1f(u('u_driftScale'),P.driftScale);
    gl.uniform1f(u('u_driftSpeed'),P.driftSpeed);
    gl.uniform1i(u('u_formType'),P.formType);
    gl.uniform1f(u('u_formStrength'),P.formStrength);
    gl.uniform1f(u('u_formWindings'),P.formWindings);
    gl.uniform1f(u('u_formFreq'),P.formFreq);
    gl.uniform1f(u('u_formHue'),P.formHue);
    gl.uniform1f(u('u_saturation'),P.saturation);
    gl.uniform1f(u('u_contrast'),P.contrast);
    gl.uniform1f(u('u_brightness'),P.brightness);
    gl.uniform1f(u('u_hueRotate'),P.hueRotate);
    gl.drawArrays(gl.TRIANGLES,0,3);
  }
  frame(steps=2){
    for(let i=0;i<steps;i++) this.step();
    this.time+=0.016*this.params.speed;
    this.render();
  }
  resize(w,h){this.canvas.width=w; this.canvas.height=h;}
}

// ══════════════════════════════════════════════════════════════════════
// ANIMATION LOOP
// ══════════════════════════════════════════════════════════════════════
function startLoop() {
  if (state.raf) return;
  const loop = () => {
    if (!state.engine) return;
    if (state.playing) state.engine.frame(2);
    else state.engine.render();
    state.raf = requestAnimationFrame(loop);
  };
  state.raf = requestAnimationFrame(loop);
}
function resizeCanvas() {
  if (!state.engine) return;
  const el = canvas.parentElement;
  const dpr = Math.min(2, window.devicePixelRatio || 1);
  state.engine.resize(Math.round(el.clientWidth*dpr), Math.round(el.clientHeight*dpr));
}
startLoop();
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// ══════════════════════════════════════════════════════════════════════
// IMAGE LOADING
// ══════════════════════════════════════════════════════════════════════
function loadImage(file) {
  if (!file || !state.engine) return;
  state.fileName = file.name;
  state.aiNote = null;
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      state.loadedImg = img;
      state.engine._lastImg = img;
      state.engine.setImage(img);
      state.engine.setParams(getParams());
      resizeCanvas();
      state.hasImage = true;
      state.playing = true;
      state.sheetOpen = false;
      renderAll();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

// ══════════════════════════════════════════════════════════════════════
// SAVE SNAPSHOT
// ══════════════════════════════════════════════════════════════════════
function saveSnapshot() {
  if (!state.engine) return;
  state.engine.render();
  const url = canvas.toDataURL('image/png');
  const a = document.createElement('a');
  a.href = url;
  a.download = `perception-${state.substance}-${getDose().amount}.png`;
  a.click();
}

// PLAY / PAUSE
// ══════════════════════════════════════════════════════════════════════
function togglePlay() {
  state.playing = !state.playing;
  renderAll();
}

async function aiTune() {
  if (!state.loadedImg || state.aiBusy) return;
  state.aiBusy = true;
  updateAiBtn();
  try {
    const img = state.loadedImg;
    const cap = 768, aspect = img.width/img.height;
    const w = aspect>=1?cap:Math.round(cap*aspect);
    const h = aspect>=1?Math.round(cap/aspect):cap;
    const c = document.createElement('canvas'); c.width=w; c.height=h;
    c.getContext('2d').drawImage(img,0,0,w,h);
    const b64 = c.toDataURL('image/jpeg',0.85).split(',')[1];
    const dose = getDose(), sub = getSubstance();
    const prompt = `You are tuning a real-time Kuramoto-oscillator psychedelic visual simulator for ${dose.amount} of ${sub.label} on this specific image. Analyze its colors, edges, lighting, composition. Return ONLY JSON (no markdown). Ranges: oscStrength 0-0.8, coupling 1.5-3.2, kCenter 1.5-3, kSurround 4-9, freqMax 0.6-2.6, colorMode 0=rainbow 1=bw 2=complementary, windings 1-4, driftAmp 0-0.015, driftSpeed 0.2-1.2, logPolar 0 or 1, formType 0=none 1=tunnel 2=spiral 3=web 4=honeycomb, formStrength 0-0.8, formWindings 2-12, formFreq 1-4, formHue 0-360, saturation 1-3, contrast 1-1.8, brightness 1-1.25, hueRotate -180 to 180, speed 0.6-1.6. Format: {"params":{...},"note":"one sentence"}`;
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model:'claude-sonnet-4-6', max_tokens:600,
        messages:[{role:'user', content:[
          {type:'image', source:{type:'base64', media_type:'image/jpeg', data:b64}},
          {type:'text', text:prompt},
        ]}],
      }),
    });
    if (!res.ok) throw new Error('API ' + res.status);
    const data = await res.json();
    const txt = data.content.map(x=>x.text||'').join('').replace(/```json|```/g,'').trim();
    const parsed = JSON.parse(txt);
    state.overrides = {...state.overrides, ...parsed.params};
    state.aiNote = parsed.note || 'Tuned to your image.';
    if (state.engine) state.engine.setParams(getParams());
  } catch(err) {
    state.aiNote = 'Auto-tune failed: ' + err.message;
  }
  state.aiBusy = false;
  renderAll();
}

// ══════════════════════════════════════════════════════════════════════
// PANEL CONTENT BUILDERS
// ══════════════════════════════════════════════════════════════════════
function buildSubstanceTab() {
  const sub = getSubstance();
  let html = '';
  for (const [key, s] of Object.entries(SUBSTANCES)) {
    const active = key === state.substance ? 'active' : '';
    html += `
      <button class="card-btn ${active}" data-action="set-substance" data-key="${key}">
        <span class="card-emoji">${s.emoji}</span>
        <div>
          <div class="card-label">${s.label}</div>
          <div class="card-sub">${s.sublabel}</div>
        </div>
        ${key === state.substance ? '<span class="card-check">✓</span>' : ''}
      </button>`;
  }
  html += uploadZoneHTML();
  html += disclaimerHTML();
  return html;
}

function buildDoseTab() {
  const sub = getSubstance();
  const dose = getDose();
  let html = `<span class="section-head">${sub.emoji} ${sub.label.toUpperCase()} — SELECT DOSE</span>`;
  sub.doses.forEach((d, i) => {
    const active = i === state.doseIdx ? 'active' : '';
    const pct = Math.round(d.i * 100);
    html += `
      <button class="dose-btn ${active}" data-action="set-dose" data-idx="${i}">
        <div class="dose-fill" style="width:${pct}%"></div>
        <div class="dose-text"><b>${d.label}</b><span class="dose-amount">${d.amount}</span></div>
        ${i === state.doseIdx ? '<span class="dose-check">✓</span>' : ''}
      </button>`;
  });
  // Intensity bar
  html += `
    <div id="intensity-wrap">
      <div id="intensity-label">
        <span>INTENSITY</span><span id="intensity-val" style="color:${getColor()}">${Math.round(dose.i*100)}%</span>
      </div>
      <div id="intensity-track">
        <div id="intensity-fill" style="width:${Math.round(dose.i*100)}%;background:linear-gradient(90deg,${getColor()}88,${getColor()})"></div>
      </div>
    </div>`;
  html += uploadZoneHTML();
  html += disclaimerHTML();
  return html;
}

function buildTuneTab() {
  const P = getParams();
  const col = getColor();
  const dose = getDose(), sub = getSubstance();

  const slider = (id, label, val, min, max, step, fmt) => `
    <div class="slider-wrap">
      <div class="slider-header">
        <span>${label}</span>
        <span class="slider-val" id="sv-${id}">${fmt(val)}</span>
      </div>
      <input type="range" id="sl-${id}" min="${min}" max="${max}" step="${step}" value="${val}"
        data-action="slider" data-key="${id}"
        style="accent-color:${col}">
    </div>`;

  const pct  = v => Math.round(v*125)+'%';
  const x2   = v => v.toFixed(2)+'×';
  const f1   = v => parseFloat(v).toFixed(1);
  const deg  = v => Math.round(v)+'°';

  const fcTypes = [['NONE',0],['TUNNEL',1],['SPIRAL',2],['WEB',3],['HONEY',4]];
  let fcPills = fcTypes.map(([nm,val]) =>
    `<button class="fc-pill ${P.formType===val?'active':''}" data-action="set-fc" data-val="${val}">${nm}</button>`
  ).join('');

  return `
    <label class="upload-zone ${state.hasImage?'has-image':''}">
      ${state.hasImage ? `📷 ${state.fileName} — tap to change` : '📷 Upload an image'}
      <input type="file" accept="image/*" data-action="upload">
    </label>
    <br>
    <button id="ai-btn" ${!state.hasImage||state.aiBusy?'disabled':''} data-action="ai-tune">
      ${state.aiBusy ? '🧠 ANALYZING IMAGE…' : '🧠 AI AUTO-TUNE TO IMAGE'}
    </button>
    ${slider('oscStrength','GEOMETRY STRENGTH',P.oscStrength,0,0.8,0.01,pct)}
    ${slider('kSurround',  'PATTERN SCALE',    P.kSurround,  3,9,  0.1, f1 )}
    ${slider('driftAmp',   'FLOW / DRIFT',      P.driftAmp,   0,0.015,0.0005,v=>Math.round(v*6667)+'%')}
    ${slider('speed',      'SPEED',             P.speed,      0.3,1.8,0.05,x2)}
    ${slider('saturation', 'COLOR INTENSITY',   P.saturation, 1,3,  0.05,x2)}
    ${slider('formStrength','FORM CONSTANT',    P.formStrength,0,0.8,0.01,pct)}
    <div id="fc-pills">${fcPills}</div>
    <div class="toggle-row">
      <button class="toggle-btn ${P.logPolar?'active':''}" data-action="toggle-logpolar">
        LOG-POLAR ${P.logPolar?'ON':'OFF'}
      </button>
      <button class="toggle-btn" data-action="reset-overrides">
        RESET PRESET
      </button>
    </div>
    ${disclaimerHTML()}`;
}

function uploadZoneHTML() {
  const has = state.hasImage;
  return `
    <label class="upload-zone ${has?'has-image':''}">
      ${has ? `📷 ${state.fileName} — tap to change` : '📷 Upload an image to begin'}
      <input type="file" accept="image/*" data-action="upload">
    </label>`;
}

function disclaimerHTML() {
  return `<div class="disclaimer">
    ⚠ Real-time replication inspired by QRI's Oscilleditor &amp; r/replications.
    For harm-reduction &amp; education only. Images never leave your device
    (except during optional AI auto-tune).
  </div>`;
}

// ══════════════════════════════════════════════════════════════════════
// TAB BARS
// ══════════════════════════════════════════════════════════════════════
function buildTabBar(container) {
  const tabs = [['substance','◈ DRUG'],['dose','⚖ DOSE'],['tune','✦ TUNE']];
  container.innerHTML = tabs.map(([key, label]) =>
    `<button class="tab-btn ${state.tab===key?'active':''}" data-action="set-tab" data-key="${key}">${label}</button>`
  ).join('');
}

// ══════════════════════════════════════════════════════════════════════
// FULL RENDER
// ══════════════════════════════════════════════════════════════════════
function renderAll() {
  syncColor();
  const sub = getSubstance(), dose = getDose(), col = getColor();

  // Update canvas visibility
  canvas.style.display = state.hasImage && !errorState.style.display.includes('block') ? 'block' : 'none';
  emptyState.style.display = state.hasImage ? 'none' : 'flex';

  // Update orbs + spinning
  [orbEl, sidebarOrbEl].forEach(el => {
    el.classList.toggle('spinning', state.playing && state.hasImage);
    el.style.boxShadow = state.playing && state.hasImage ? `0 0 14px ${col}66` : 'none';
  });

  // Update topbar info
  topbarSub.textContent = `${sub.emoji} ${sub.label} · ${dose.label} (${dose.amount})${state.fileName?' · '+state.fileName:' · GPU real-time'}`;

  // Dose pips
  const pipHTML = sub.doses.map((_,i) =>
    `<div class="pip ${i<=state.doseIdx?'active':''}"></div>`
  ).join('');
  doseRibbon.innerHTML = pipHTML;
  sidebarPips.innerHTML = pipHTML;

  // FABs (mobile)
  fabPlay.style.display = state.hasImage ? 'flex' : 'none';
  fabPlay.textContent = state.playing ? '❚❚' : '▶';
  fabPlay.classList.toggle('paused', !state.playing);
  fabSave.style.display = state.hasImage ? 'flex' : 'none';
  fabSettings.classList.toggle('open', state.sheetOpen);

  // Desktop play btn
  deskPlay.textContent = state.playing ? '❚❚ PAUSE' : '▶ PLAY';
  deskPlay.classList.toggle('paused', !state.playing);

  // Sheet open/close (mobile)
  sheet.classList.toggle('open', state.sheetOpen);

  // AI note
  aiNoteEl.style.display = state.aiNote && state.hasImage ? 'block' : 'none';
  if (state.aiNote) aiNoteEl.textContent = '🧠 ' + state.aiNote;

  // Tab bars
  buildTabBar(mobTabs);
  buildTabBar(deskTabs);

  // Panel bodies
  let content = '';
  if (state.tab === 'substance') content = buildSubstanceTab();
  else if (state.tab === 'dose') content = buildDoseTab();
  else content = buildTuneTab();
  mobBody.innerHTML = content;
  deskBody.innerHTML = content;

  // Sync engine params
  if (state.engine) state.engine.setParams(getParams());

  // Border color on sheet
  sheet.style.borderTopColor = col + '44';
}

function updateAiBtn() {
  document.querySelectorAll('#ai-btn').forEach(btn => {
    btn.textContent = state.aiBusy ? '🧠 ANALYZING IMAGE…' : '🧠 AI AUTO-TUNE TO IMAGE';
    btn.disabled = !state.hasImage || state.aiBusy;
  });
}

// ══════════════════════════════════════════════════════════════════════
// EVENT DELEGATION — single listener on document catches everything
// ══════════════════════════════════════════════════════════════════════
document.addEventListener('click', e => {
  const btn = e.target.closest('[data-action]');
  if (!btn) return;
  const action = btn.dataset.action;

  if (action === 'set-substance') {
    state.substance = btn.dataset.key;
    state.doseIdx = 2;
    state.overrides = {};
    state.tab = 'dose';
    renderAll();
  }
  else if (action === 'set-dose') {
    state.doseIdx = parseInt(btn.dataset.idx);
    state.overrides = {};
    renderAll();
  }
  else if (action === 'set-tab') {
    state.tab = btn.dataset.key;
    renderAll();
  }
  else if (action === 'set-fc') {
    state.overrides.formType = parseInt(btn.dataset.val);
    if (state.engine) state.engine.setParams(getParams());
    renderAll();
  }
  else if (action === 'toggle-logpolar') {
    const P = getParams();
    state.overrides.logPolar = P.logPolar ? 0 : 1;
    if (state.engine) state.engine.setParams(getParams());
    renderAll();
  }
  else if (action === 'reset-overrides') {
    state.overrides = {};
    if (state.engine) state.engine.setParams(getParams());
    renderAll();
  }
  else if (action === 'ai-tune') {
    aiTune();
  }
});

// File upload
document.addEventListener('change', e => {
  if (e.target.dataset.action === 'upload') {
    loadImage(e.target.files[0]);
  }
});

// Sliders — live update without full re-render
document.addEventListener('input', e => {
  if (e.target.dataset.action !== 'slider') return;
  const key = e.target.dataset.key;
  const val = parseFloat(e.target.value);
  state.overrides[key] = val;
  if (state.engine) state.engine.setParams(getParams());
  // Update just the value label
  document.querySelectorAll(`#sv-${key}`).forEach(el => {
    const fmts = {
      oscStrength: v => Math.round(v*125)+'%',
      kSurround:   v => parseFloat(v).toFixed(1),
      driftAmp:    v => Math.round(v*6667)+'%',
      speed:       v => parseFloat(v).toFixed(2)+'×',
      saturation:  v => parseFloat(v).toFixed(2)+'×',
      formStrength:v => Math.round(v*125)+'%',
    };
    el.textContent = (fmts[key] || (v=>parseFloat(v).toFixed(2)))(val);
  });
});

// FABs
fabPlay.addEventListener('click', togglePlay);
fabSave.addEventListener('click', saveSnapshot);
fabSettings.addEventListener('click', () => {
  state.sheetOpen = !state.sheetOpen;
  renderAll();
});
$('sheet-handle').addEventListener('click', () => {
  state.sheetOpen = false;
  renderAll();
});

// Desktop btns
deskPlay.addEventListener('click', togglePlay);
deskSave.addEventListener('click', saveSnapshot);

// Empty state → open sheet to substance tab
emptyState.addEventListener('click', () => {
  state.tab = 'substance';
  state.sheetOpen = true;
  renderAll();
});

// Drag-and-drop anywhere on stage
const stage = $('stage');
stage.addEventListener('dragover', e => e.preventDefault());
stage.addEventListener('drop', e => {
  e.preventDefault();
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) loadImage(file);
});

// ══════════════════════════════════════════════════════════════════════
// INITIAL RENDER
// ══════════════════════════════════════════════════════════════════════
renderAll();
</script>
</body>
</html>
